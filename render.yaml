# Render Blueprint — auto-deploys both services from your GitHub repo
# Docs: https://render.com/docs/blueprint-spec

services:
  # ── ML Service (Python / FastAPI) ─────────────────────────────
  - type: web
    name: discount-advisory-ml
    rootDir: ml-service
    region: oregon
    plan: free
    dockerfilePath: Dockerfile
    healthCheckPath: /health
    envVars:
      - key: ML_ALLOWED_ORIGINS
        sync: false # Set AFTER deploying backend — use your backend's .onrender.com URL

  # ── Node.js Backend (Express) ─────────────────────────────────
  - type: web
    name: discount-advisory-backend
    runtime: node
    rootDir: backend
    region: oregon
    plan: free
    buildCommand: npm install --only=production
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false # Your MongoDB Atlas connection string
      - key: JWT_SECRET
        generateValue: true # Render generates a secure random value
      - key: ML_SERVICE_URL
        sync: false # Your ML service URL — e.g. https://discount-advisory-ml.onrender.com
      - key: CORS_ORIGIN
        sync: false # Your Vercel frontend URL — e.g. https://your-app.vercel.app
